<!DOCTYPE>
<html>
    <head>
       <title>Registration Form</title> 
       <style>
       body{
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .container{
            width: 400px;
            background-color: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

         input[type="text"],
        input[type="email"],
        input[type="password"]{
            width: 50%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

         .gender-group{
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .form-group{
            margin-bottom: 20px;
        }

        label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

         input[type="submit"]{
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

         h1{
            text-align: center;
            color: #333;
        }

        input[type="submit"]:hover{
            background-color: #45a049;
        }
       </style>
    </head>
    <body>
        <div class="container">
        <h1 align="center">Registration Form</h1>
          <form>
            <div class="form-group">
              <label for="name">Name :</label>
              <input type="text" id="name" size="20"/>
            </div>

            <div class="form-group">
              <label for="email">Email :</label>
              <input type="email" id="email" size="50"/>
            </div>

            <div class="form-group">
              <label for="password">Password :</label>
              <input type="password" id="password" size="20"/>
            </div>

            <div class="form-group">
              <label>Gender :</label>
              <div class="gender-group">
                   <div>
                        <input type="radio" name="gender">
                        <lable for="male">Male</lable>
                   </div>
                    
                   <div>
                        <input type="radio" name="gender">
                        <lable for="female">Female</lable>
                   </div>
                    
                   <div>
                         <input type="radio" name="gender">
                         <lable for="other">Other</lable>
                   </div>
                </div>      
            <input type="submit" value="Submit"> 
          </form>
        </div>
    </body>
</html>
