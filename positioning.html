<!DOCTYPE html>
<html>
<head>
<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
}

/* STICKY */
nav{
    position:sticky;
    top:0;
    background-color:steelblue;
    color:white;
    padding:15px;
    text-align:center;
}

/* RELATIVE */
.card{
    position:relative;
    width:300px;
    height:200px;
    border:2px solid black;
    margin:50px auto;
    padding:20px;
}

/* ABSOLUTE */
.badge{
    position:absolute;
    top:10px;
    right:10px;
    background-color:red;
    color:white;
    padding:5px 10px;
}

/* RELATIVE */
.move-me{
    position:relative;
    left:50px;
    background-color:yellow;
    padding:10px;
    width:150px;
}

/* FIXED */
.chat-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background-color:green;
    color:white;
    padding:15px;
    border-radius:50%;
}

.content{
    height:1200px;
    padding:20px;
}

</style>
</head>

<body>

<!-- STICKY -->
<nav>
    Home | About | Contact
</nav>

<div class="content">

    <h1>CSS Positioning Demo</h1>

    <!-- RELATIVE -->
    <div class="move-me">
        Relative Box
    </div>

    <!-- RELATIVE + ABSOLUTE -->
    <div class="card">

        <!-- ABSOLUTE -->
        <div class="badge">
            NEW
        </div>

        <h2>Product Card</h2>
        <p>This card demonstrates relative and absolute positioning.</p>

    </div>

    <p>
        Scroll down to see Sticky Navbar and Fixed Chat Button in action.
    </p>

</div>

<!-- FIXED -->
<div class="chat-btn">
    💬
</div>

</body>
</html>
