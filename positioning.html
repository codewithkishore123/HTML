<!DOCTYPE html>
<html>
<head>
    <title>CSS Position Demo</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
        }

        /* STICKY NAVBAR */

        nav{
            position:sticky;
            top:0;
            background-color:steelblue;
            color:white;
            padding:20px;
            text-align:center;
            z-index:1000;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
        }

        /* RELATIVE EXAMPLE */

        .relative-box{
            position:relative;
            left:50px;
            margin-top:30px;
            width:200px;
            background-color:yellow;
            padding:15px;
            border:1px solid black;
        }

        /* CARD */

        .card{
            position:relative;
            width:350px;
            height:220px;
            border:2px solid black;
            margin:50px auto;
            padding:20px;
        }

        /* ABSOLUTE EXAMPLE */

        .badge{
            position:absolute;
            top:10px;
            right:10px;
            background-color:red;
            color:white;
            padding:5px 10px;
            border-radius:5px;
        }

        /* FIXED BUTTON */

        .chat-button{
            position:fixed;
            bottom:20px;
            right:20px;
            background-color:green;
            color:white;
            padding:15px;
            border-radius:50%;
            font-size:20px;
            cursor:pointer;
        }

        /* CONTENT */

        .content{
            padding:20px;
        }

        .section{
            height:600px;
            border:1px solid gray;
            margin-top:20px;
            padding:20px;
        }

    </style>

</head>

<body>

    <!-- STICKY NAVBAR -->

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>

    <div class="content">

        <h1>Positioning Demo</h1>

        <!-- RELATIVE -->

        <div class="relative-box">
            Relative Box
        </div>

        <!-- RELATIVE + ABSOLUTE -->

        <div class="card">

            <div class="badge">
                NEW
            </div>

            <h2>Product Card</h2>

            <p>
                This badge is positioned using
                <strong>absolute positioning</strong>.
            </p>

        </div>

        <div class="section">
            <h2>Section 1</h2>
            <p>Scroll down...</p>
        </div>

        <div class="section">
            <h2>Section 2</h2>
            <p>Keep scrolling...</p>
        </div>

        <div class="section">
            <h2>Section 3</h2>
            <p>Observe the navbar and chat button.</p>
        </div>

    </div>

    <!-- FIXED -->

    <div class="chat-button">
        💬
    </div>

</body>
</html>
