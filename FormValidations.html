<!DOCTYPE>
<html>
    <head>
        <title>Form Validation</title>
        <style>

            body{
                background-color: rgba(234, 234, 228, 0.838)
            }
            .container{
                width:400px;
                height:500px;
                margin:30px auto;
                background-color:white; 
                border-radius:10px;
                align-items: center;    
                padding: 20px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                border-color:gray;
                
            }
            .form-group{
                display:flex;
                flex-direction:column;
                gap:5px;
            }
         
            .submit{
                display:flex;
                justify-content: center;
            }
            button{
                background-color:green;
                color:white;
                cursor:pointer;
            }
        </style>

    </head>
    <body>
   <div class="container">
     <form>
    
    <div class="form-group">
    <label>Username</label>
    <input
        type="text"
        minlength="5"
        maxlength="15"
        required>

    <br><br>

    <label>Email</label>
    <input
        type="email"
        required>

    <br><br>

    <label>Age</label>
    <input
        type="number"
        min="18"
        max="60"
        required>

    <br><br>

    <label>Phone</label>
    <input
        type="text"
        pattern="[0-9]{10}"
        required>

    <br><br>

    <label>Password</label>
    <input
        type="password"
        minlength="8"
        required>

    <br><br>

    </div>

    <input type="checkbox" required>
    Accept Terms

    <br><br>
    <div class ="submit">
        <button type="submit">
        Register
    </button>
    </div>
    

</form>
</div>
    </body>
</html>
